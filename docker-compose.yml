services:
  api:
    build:
      context: .
      target: api
    image: skincare-coach-api:latest
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Qdrant vector store — build once on host, then mount read-write.
      # First-time setup:
      #   docker compose run --rm api python scripts/build_index.py
      - ./data/qdrant:/app/data/qdrant
      # SQLite user/routine DB — persists across container restarts.
      - ./data/users.db:/app/data/users.db
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # OCR benchmark worker — only started with: docker compose --profile ocr up
  # The heavy YomiToku + OpenCV layer lives here, not in the api image.
  ocr-worker:
    build:
      context: .
      target: ocr-worker
    image: skincare-coach-ocr:latest
    env_file: .env
    volumes:
      - ./data/golden_set:/app/data/golden_set:ro
      - ./data/ocr_out:/app/data/ocr_out
      # Cache YomiToku model weights so they survive container restarts
      - ocr-model-cache:/root/.cache
    profiles:
      - ocr

volumes:
  ocr-model-cache:
