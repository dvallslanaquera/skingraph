name: "Install Python dependencies"
description: >
  Export the Poetry lock to a pinned requirements file, then install the runtime
  deps plus pytest. Mirrors the Dockerfile builder stage — no torch, since
  embeddings run on ONNX Runtime (fastembed) — so CI tests the exact dependency
  set that ships.

inputs:
  python-version:
    description: "Python version already set up by the caller (used for the cache key)."
    required: true

runs:
  using: composite
  steps:
    - name: Cache pip downloads
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('poetry.lock') }}
        restore-keys: |
          pip-${{ runner.os }}-py${{ inputs.python-version }}-

    - name: Export locked requirements
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install "poetry==2.4.0" poetry-plugin-export
        poetry export --without dev --without-hashes -f requirements.txt -o requirements.txt

    - name: Install dependencies
      shell: bash
      run: |
        pip install -r requirements.txt
        pip install "pytest>=9.1.0,<10.0.0"
