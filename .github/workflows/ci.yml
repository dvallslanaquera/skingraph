# Continuous Integration — runs on every PR and on pushes to main.
# Independent gates: lint (ruff + mypy), backend tests (+ coverage floor),
# eval replay (offline F1 regression gate), frontend build, Docker image build
# + Trivy vulnerability scan, secret scan (gitleaks), and Terraform validation.
# None require cloud credentials or a model API key.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # mypy needs the real runtime deps (pydantic plugin, langgraph types).
      - name: Install dependencies
        uses: ./.github/actions/python-deps
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install "ruff>=0.15.20,<0.16" "mypy>=2.1,<3"

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy src

  backend:
    name: Backend tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Boundaries of the supported range in pyproject.toml (>=3.10,<4.0).
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        uses: ./.github/actions/python-deps
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run test suite
        # Offline/deterministic: every Gemini and vector-store call is mocked.
        run: pytest

  eval-replay:
    name: Eval regression gate (replay, F1 floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        uses: ./.github/actions/python-deps
        with:
          python-version: "3.12"

      - name: Replay recorded cassettes against the scoring path
        # Fully offline: no API key, no images. Fails on F1 regression OR on a
        # prompt/model change without a matching local re-record (staleness guard).
        run: python -m eval.evaluate --replay --min-f1 0.90

      - name: Publish eval scorecard (run summary + trend + badges)
        # Renders the per-commit scorecard onto the Actions run page, appends the
        # aggregate to the trend history, and refreshes the shields endpoint JSON
        # so the README badges track real numbers. Runs even if the gate failed,
        # so a regression is still visible on the summary.
        if: always()
        run: |
          python -m eval.scorecard \
            --history eval/history.jsonl \
            --badges docs/badges \
            --commit "${GITHUB_SHA}"

      - name: Upload scorecard artifacts (history + badges)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-scorecard
          path: |
            eval/history.jsonl
            docs/badges/*.json

  coach-faithfulness:
    name: Coach faithfulness gate (mandated-caution coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        uses: ./.github/actions/python-deps
        with:
          python-version: "3.12"

      - name: Assert the coach drops no deterministic safety caution
        # Offline, no API key: the Gemini call is stubbed to return empty
        # warnings, so every caution in the card is the code-injected
        # deterministic one. Fails if any mandated safety caution (pregnancy /
        # dehydration / sun / pacing) is missing from a rendered card.
        run: python -m eval.coach_eval --min-coverage 1.0

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        # `npm run build` is `tsc -b && vite build`, so this covers type errors too.
        run: npm run build

  docker:
    name: Docker image build + Trivy scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: false
          # Load into the local daemon so Trivy can scan the built image.
          load: true
          tags: |
            skincare-coach-api:ci
            skincare-coach-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: skincare-coach-api:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: gitleaks scans every commit, not just the checkout.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Init (no backend, no credentials)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate
