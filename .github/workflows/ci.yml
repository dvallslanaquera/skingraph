# Continuous Integration — runs on every PR and on pushes to main.
# Four independent gates: backend tests, frontend build, Docker image build,
# and Terraform validation. None require cloud credentials.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Boundaries of the supported range in pyproject.toml (>=3.10,<4.0).
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        uses: ./.github/actions/python-deps
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run test suite
        # Offline/deterministic: every Gemini and vector-store call is mocked.
        run: pytest

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        # `npm run build` is `tsc -b && vite build`, so this covers type errors too.
        run: npm run build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build api image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: api
          push: false
          load: false
          tags: skincare-coach-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Init (no backend, no credentials)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate
