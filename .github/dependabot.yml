# Weekly dependency updates, grouped to keep PR noise low.
version: 2
updates:
  # Python runtime deps (Poetry lock + pyproject)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  # Frontend deps
  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
    groups:
      frontend:
        patterns: ["*"]

  # GitHub Actions used by the workflows above
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Base images in the Dockerfile
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  # Terraform providers/modules
  - package-ecosystem: terraform
    directory: "/terraform"
    schedule:
      interval: weekly
