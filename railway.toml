[build]
# No build target is set: Railway builds the LAST Dockerfile stage, which is
# `api` by design. (ocr-worker sits earlier so it stays out of the deploy.)
dockerfilePath = "Dockerfile"

[deploy]
startCommand       = "/app/entrypoint.sh"
healthcheckPath    = "/health"
# 300 s covers the Qdrant index build on first cold start (~60 s on Starter).
healthcheckTimeout = 300
